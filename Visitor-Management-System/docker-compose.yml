services:

  web:
    build: ./web
    container_name: visitor-app

    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

    networks:
      - visitor-network

  postgres:
    image: postgres:15

    container_name: postgres-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: visitors

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - visitor-network

  redis:
    image: redis:7

    container_name: redis-cache

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    networks:
      - visitor-network

volumes:
  postgres-data:
  redis-data:

networks:
  visitor-network:
    driver: bridge
