version: "3.9"

services:
  web:
    build:
      context: ./web
    container_name: visitor-app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - visitor-network
    restart: always   # Restart policy added

  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: visitors
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - visitor-network
    restart: always   # Restart policy added
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d visitors"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - visitor-network
    restart: always   # Restart policy added

volumes:
  postgres-data:
  redis-data:

networks:
  visitor-network:
    driver: bridge
